<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chá Bar · Fernanda & David</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --desert-rock: #A48D78;
    --sandstone: #CBB9A4;
    --creamed-oat: #E6DAC8;
    --porcelain: #F4F1EA;
    --feather: #FAF9F6;
    --text-dark: #5C4A38;
    --text-mid: #8C7660;
    --text-light: #B8A898;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--feather);
    color: var(--text-dark);
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    background: var(--porcelain);
    text-align: center;
    padding: 70px 24px 60px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(164,141,120,.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 80% 20%, rgba(203,185,164,.2) 0%, transparent 55%);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: .72rem;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--sandstone);
    margin-bottom: 20px;
  }
  .hero-names {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 10vw, 5.5rem);
    font-weight: 300;
    line-height: 1.05;
    color: var(--text-dark);
    margin-bottom: 8px;
  }
  .hero-names em {
    font-style: italic;
    color: var(--desert-rock);
  }
  .hero-amp {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-style: italic;
    color: var(--sandstone);
    display: block;
    margin-bottom: 6px;
  }
  .hero-date {
    font-size: .8rem;
    font-weight: 300;
    letter-spacing: .18em;
    color: var(--text-mid);
    margin-top: 20px;
  }
  .hero-divider {
    width: 56px;
    height: 1px;
    background: var(--sandstone);
    margin: 24px auto;
  }
  .hero-sub {
    font-size: .85rem;
    font-weight: 300;
    color: var(--text-mid);
    max-width: 380px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* ── ADMIN TOGGLE ── */
  .admin-bar {
    background: var(--creamed-oat);
    border-bottom: 1px solid rgba(164,141,120,.2);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }
  .admin-bar label {
    font-size: .75rem;
    font-weight: 500;
    letter-spacing: .1em;
    color: var(--text-mid);
    text-transform: uppercase;
  }
  #adminToggle {
    appearance: none;
    width: 40px; height: 22px;
    border-radius: 11px;
    background: var(--sandstone);
    cursor: pointer;
    position: relative;
    transition: background .25s;
  }
  #adminToggle::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: white;
    top: 3px; left: 3px;
    transition: transform .25s;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
  }
  #adminToggle:checked { background: var(--desert-rock); }
  #adminToggle:checked::after { transform: translateX(18px); }

  #adminPwdWrap {
    display: none;
    align-items: center;
    gap: 8px;
  }
  #adminPwdWrap.visible { display: flex; }
  #adminPwdInput {
    border: 1px solid var(--sandstone);
    background: white;
    border-radius: 6px;
    padding: 5px 10px;
    font-family: 'Jost', sans-serif;
    font-size: .8rem;
    color: var(--text-dark);
    outline: none;
    width: 130px;
  }
  #adminPwdBtn {
    background: var(--desert-rock);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-family: 'Jost', sans-serif;
    font-size: .75rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: .05em;
  }
  .admin-hint {
    font-size: .72rem;
    color: var(--text-light);
    font-style: italic;
  }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 28px 20px 8px;
  }
  .filter-btn {
    background: transparent;
    border: 1px solid var(--sandstone);
    border-radius: 30px;
    padding: 6px 18px;
    font-family: 'Jost', sans-serif;
    font-size: .75rem;
    font-weight: 400;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-mid);
    cursor: pointer;
    transition: all .2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--desert-rock);
    border-color: var(--desert-rock);
    color: white;
  }

  /* ── GRID ── */
  .grid-wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 24px 20px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 20px;
  }

  /* ── CARD ── */
  .card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(203,185,164,.4);
    transition: box-shadow .25s, transform .2s;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    box-shadow: 0 10px 36px rgba(164,141,120,.18);
    transform: translateY(-2px);
  }
  .card.bought {
    opacity: .65;
  }
  .card.bought .card-img img {
    filter: grayscale(.5);
  }

  .card-img {
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--porcelain);
    overflow: hidden;
    position: relative;
  }
  .card-img img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform .4s;
  }
  .card:hover .card-img img {
    transform: scale(1.04);
  }
  .card-img .no-img {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-light);
    font-size: 2.5rem;
  }

  .badge-bought {
    position: absolute;
    top: 12px; left: 12px;
    background: rgba(164,141,120,.9);
    color: white;
    font-size: .65rem;
    font-weight: 500;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    backdrop-filter: blur(4px);
  }

  .card-body {
    padding: 18px 18px 14px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card-category {
    font-size: .65rem;
    font-weight: 500;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--sandstone);
  }
  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-weight: 400;
    color: var(--text-dark);
    line-height: 1.3;
  }
  .card-desc {
    font-size: .78rem;
    font-weight: 300;
    color: var(--text-mid);
    line-height: 1.6;
    flex: 1;
  }
  .card-qty {
    font-size: .75rem;
    font-weight: 400;
    color: var(--text-light);
    margin-top: 4px;
  }
  .card-qty span {
    color: var(--desert-rock);
    font-weight: 500;
  }

  .card-footer {
    padding: 0 18px 18px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn-link {
    flex: 1;
    text-align: center;
    background: var(--creamed-oat);
    color: var(--text-dark);
    text-decoration: none;
    font-size: .75rem;
    font-weight: 500;
    letter-spacing: .08em;
    padding: 9px 14px;
    border-radius: 8px;
    transition: background .2s;
    border: none;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
  }
  .btn-link:hover { background: var(--sandstone); }
  .btn-link.disabled {
    opacity: .4;
    pointer-events: none;
  }

  .btn-mark {
    background: var(--desert-rock);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 9px 14px;
    font-size: .75rem;
    font-weight: 500;
    letter-spacing: .06em;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    transition: background .2s, transform .1s;
    white-space: nowrap;
  }
  .btn-mark:hover { background: #8C7360; }
  .btn-mark:active { transform: scale(.97); }
  .btn-mark.undo {
    background: white;
    color: var(--desert-rock);
    border: 1px solid var(--desert-rock);
  }
  .btn-mark.undo:hover { background: var(--porcelain); }

  /* admin only */
  .admin-only { display: none; }
  body.admin-mode .admin-only { display: flex; }

  /* ── ADD ITEM ── */
  .add-section {
    display: none;
    max-width: 980px;
    margin: 0 auto;
    padding: 0 20px 32px;
  }
  body.admin-mode .add-section { display: block; }

  .add-card {
    background: white;
    border: 1.5px dashed var(--sandstone);
    border-radius: 16px;
    padding: 28px;
  }
  .add-card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    color: var(--text-dark);
    margin-bottom: 18px;
    font-weight: 400;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .form-row.full { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label {
    font-size: .7rem;
    font-weight: 500;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-mid);
  }
  .form-group input, .form-group select, .form-group textarea {
    border: 1px solid var(--creamed-oat);
    border-radius: 8px;
    padding: 9px 12px;
    font-family: 'Jost', sans-serif;
    font-size: .85rem;
    color: var(--text-dark);
    background: var(--feather);
    outline: none;
    transition: border-color .2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--desert-rock);
  }
  .btn-add {
    background: var(--desert-rock);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 11px 28px;
    font-family: 'Jost', sans-serif;
    font-size: .8rem;
    font-weight: 500;
    letter-spacing: .08em;
    cursor: pointer;
    margin-top: 6px;
    transition: background .2s;
  }
  .btn-add:hover { background: #8C7360; }

  /* ── STATS ── */
  .stats {
    display: flex;
    gap: 0;
    max-width: 980px;
    margin: 0 auto;
    padding: 0 20px 4px;
    justify-content: flex-end;
    font-size: .75rem;
    color: var(--text-light);
    font-weight: 300;
  }
  .stats span { color: var(--desert-rock); font-weight: 500; }

  /* ── EMPTY ── */
  .empty-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
    font-style: italic;
    font-size: .9rem;
    grid-column: 1 / -1;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text-dark);
    color: white;
    padding: 12px 22px;
    border-radius: 30px;
    font-size: .8rem;
    font-weight: 400;
    letter-spacing: .05em;
    opacity: 0;
    transition: all .3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 520px) {
    .form-row { grid-template-columns: 1fr; }
    .grid-wrap { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- HERO -->
<header class="hero">
  <p class="hero-eyebrow">Chá Bar · Lista de Presentes</p>
  <div class="hero-names">
    <em>Fernanda</em>
    <span class="hero-amp">&amp;</span>
    <em>David</em>
  </div>
  <div class="hero-divider"></div>
  <p class="hero-sub">Cada presente é um gesto de carinho que nos ajuda a construir nosso lar juntos. Obrigada por fazer parte desse momento especial!</p>
  <p class="hero-date" id="eventDate">· 2025 ·</p>
</header>

<!-- ADMIN BAR -->
<div class="admin-bar">
  <label for="adminToggle">Modo Noivos</label>
  <input type="checkbox" id="adminToggle">
  <div id="adminPwdWrap">
    <input type="password" id="adminPwdInput" placeholder="Senha secreta…">
    <button id="adminPwdBtn">Entrar</button>
  </div>
  <span class="admin-hint" id="adminHint">Apenas para Fernanda &amp; David</span>
</div>

<!-- FILTERS -->
<div class="filters">
  <button class="filter-btn active" data-filter="all">Todos</button>
  <button class="filter-btn" data-filter="cozinha">Cozinha</button>
  <button class="filter-btn" data-filter="quarto">Quarto</button>
  <button class="filter-btn" data-filter="banheiro">Banheiro</button>
  <button class="filter-btn" data-filter="sala">Sala</button>
  <button class="filter-btn" data-filter="outros">Outros</button>
  <button class="filter-btn" data-filter="available">Disponíveis</button>
</div>

<!-- STATS -->
<div class="stats" id="statsBar"></div>

<!-- ADD ITEM (admin only) -->
<div class="add-section">
  <div class="add-card">
    <h3>+ Adicionar presente</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Nome do presente *</label>
        <input type="text" id="newName" placeholder="Ex: Jogo de panelas">
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="newCategory">
          <option value="cozinha">Cozinha</option>
          <option value="quarto">Quarto</option>
          <option value="banheiro">Banheiro</option>
          <option value="sala">Sala</option>
          <option value="outros">Outros</option>
        </select>
      </div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label>Descrição</label>
        <input type="text" id="newDesc" placeholder="Ex: 8 peças, antiaderente">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>URL da foto</label>
        <input type="text" id="newImg" placeholder="https://…">
      </div>
      <div class="form-group">
        <label>Link para comprar</label>
        <input type="text" id="newLink" placeholder="https://…">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Quantidade disponível</label>
        <input type="number" id="newQty" value="1" min="1" max="99">
      </div>
    </div>
    <button class="btn-add" onclick="addItem()">Adicionar à lista</button>
  </div>
</div>

<!-- GRID -->
<div class="grid-wrap" id="grid"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const ADMIN_PASSWORD = 'fernanda2025'; // mude aqui!
const STORAGE_KEY = 'chabar_gifts_v2';

// ── SAMPLE ITEMS (preencha com seus produtos) ────────────
const defaultItems = [
  {
    id: 1, name: 'Jogo de Panelas', category: 'cozinha',
    desc: '8 peças antiaderente, fundo triplo, alças ergonômicas',
    img: 'https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=400&q=80',
    link: 'https://www.amazon.com.br',
    totalQty: 1, boughtQty: 0
  },
  {
    id: 2, name: 'Jogo de Cama King', category: 'quarto',
    desc: '4 peças, 100% algodão egípcio, 400 fios',
    img: 'https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=400&q=80',
    link: 'https://www.tokstok.com.br',
    totalQty: 1, boughtQty: 0
  },
  {
    id: 3, name: 'Aspirador de Pó Robô', category: 'sala',
    desc: 'Mapeamento laser, autonomia 90min, app via celular',
    img: 'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&q=80',
    link: 'https://www.magazineluiza.com.br',
    totalQty: 1, boughtQty: 0
  },
  {
    id: 4, name: 'Kit Toalhas de Banho', category: 'banheiro',
    desc: '6 toalhas premium, 600g/m², 100% algodão',
    img: 'https://images.unsplash.com/photo-1600369671236-e74521d4b6ad?w=400&q=80',
    link: 'https://www.casasbahia.com.br',
    totalQty: 2, boughtQty: 0
  },
  {
    id: 5, name: 'Fritadeira Air Fryer', category: 'cozinha',
    desc: '12L, digital, 10 funções, inox',
    img: 'https://images.unsplash.com/photo-1648215263248-4c9c4fcf3cfe?w=400&q=80',
    link: 'https://www.americanas.com.br',
    totalQty: 1, boughtQty: 0
  },
  {
    id: 6, name: 'Conjunto de Talheres', category: 'cozinha',
    desc: '24 peças inox polido, com estojo',
    img: 'https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=400&q=80',
    link: 'https://www.tokstok.com.br',
    totalQty: 1, boughtQty: 0
  },
];

// ── STATE ────────────────────────────────────────────────
let items = [];
let adminMode = false;
let activeFilter = 'all';
let nextId = 100;

function loadItems() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      items = parsed.items || defaultItems;
      nextId = parsed.nextId || 100;
    } else {
      items = JSON.parse(JSON.stringify(defaultItems));
    }
  } catch(e) {
    items = JSON.parse(JSON.stringify(defaultItems));
  }
}

function saveItems() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ items, nextId }));
}

// ── RENDER ───────────────────────────────────────────────
function render() {
  const grid = document.getElementById('grid');
  let visible = items;

  if (activeFilter === 'available') {
    visible = items.filter(i => i.boughtQty < i.totalQty);
  } else if (activeFilter !== 'all') {
    visible = items.filter(i => i.category === activeFilter);
  }

  if (visible.length === 0) {
    grid.innerHTML = '<p class="empty-msg">Nenhum presente nesta categoria ainda 🌿</p>';
  } else {
    grid.innerHTML = visible.map(cardHTML).join('');
  }

  updateStats();
}

function cardHTML(item) {
  const remaining = item.totalQty - item.boughtQty;
  const isBought = remaining <= 0;
  const hasLink = item.link && item.link.startsWith('http');

  return `
  <div class="card ${isBought ? 'bought' : ''}" id="card-${item.id}">
    <div class="card-img">
      ${item.img
        ? `<img src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'no-img\\'>🎁</div>'">`
        : `<div class="no-img">🎁</div>`}
      ${isBought ? '<div class="badge-bought">Já presenteado</div>' : ''}
    </div>
    <div class="card-body">
      <div class="card-category">${item.category}</div>
      <div class="card-name">${item.name}</div>
      ${item.desc ? `<div class="card-desc">${item.desc}</div>` : ''}
      <div class="card-qty">
        Disponível: <span>${remaining}</span> de ${item.totalQty}
      </div>
    </div>
    <div class="card-footer">
      ${hasLink
        ? `<a href="${item.link}" target="_blank" rel="noopener" class="btn-link ${isBought ? 'disabled' : ''}">Ver produto →</a>`
        : `<span class="btn-link" style="opacity:.3;cursor:default">Sem link</span>`}
      ${adminMode
        ? `<button class="btn-mark ${isBought ? 'undo' : ''}" onclick="toggleBought(${item.id})">
             ${isBought ? 'Desfazer' : 'Marcar presenteado'}
           </button>`
        : (!isBought
          ? `<button class="btn-mark" onclick="guestMark(${item.id})">Vou presentear!</button>`
          : '')
      }
    </div>
    ${adminMode ? `<div class="admin-only" style="padding:0 18px 14px">
      <button onclick="removeItem(${item.id})" style="background:none;border:none;color:var(--text-light);font-size:.7rem;cursor:pointer;font-family:Jost,sans-serif;letter-spacing:.05em;text-decoration:underline;">Remover</button>
    </div>` : ''}
  </div>`;
}

function updateStats() {
  const total = items.length;
  const bought = items.filter(i => i.boughtQty >= i.totalQty).length;
  document.getElementById('statsBar').innerHTML =
    `<span>${bought}</span>&nbsp;de&nbsp;<span>${total}</span>&nbsp;presentes já foram presenteados`;
}

// ── ACTIONS ─────────────────────────────────────────────
function toggleBought(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  if (item.boughtQty >= item.totalQty) {
    item.boughtQty = Math.max(0, item.boughtQty - 1);
    showToast('Marcação desfeita ↩');
  } else {
    item.boughtQty++;
    showToast('Presenteado! 🎉');
  }
  saveItems();
  render();
}

function guestMark(id) {
  const item = items.find(i => i.id === id);
  if (!item || item.boughtQty >= item.totalQty) return;
  if (confirm(`Você vai presentear "${item.name}"? Isso vai marcar como reservado para você.`)) {
    item.boughtQty++;
    saveItems();
    render();
    showToast('Obrigada! Você é incrível 💛');
  }
}

function removeItem(id) {
  if (!confirm('Remover este presente da lista?')) return;
  items = items.filter(i => i.id !== id);
  saveItems();
  render();
  showToast('Presente removido');
}

function addItem() {
  const name = document.getElementById('newName').value.trim();
  if (!name) { showToast('Digite o nome do presente'); return; }
  const item = {
    id: ++nextId,
    name,
    category: document.getElementById('newCategory').value,
    desc: document.getElementById('newDesc').value.trim(),
    img: document.getElementById('newImg').value.trim(),
    link: document.getElementById('newLink').value.trim(),
    totalQty: parseInt(document.getElementById('newQty').value) || 1,
    boughtQty: 0
  };
  items.push(item);
  saveItems();
  render();
  // clear form
  ['newName','newDesc','newImg','newLink'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('newQty').value = '1';
  showToast('Presente adicionado! 🎁');
}

// ── ADMIN AUTH ───────────────────────────────────────────
document.getElementById('adminToggle').addEventListener('change', function() {
  if (this.checked) {
    document.getElementById('adminPwdWrap').classList.add('visible');
    document.getElementById('adminHint').style.display = 'none';
  } else {
    adminMode = false;
    document.body.classList.remove('admin-mode');
    document.getElementById('adminPwdWrap').classList.remove('visible');
    document.getElementById('adminHint').style.display = '';
    render();
  }
});

document.getElementById('adminPwdBtn').addEventListener('click', checkPwd);
document.getElementById('adminPwdInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPwd();
});

function checkPwd() {
  const val = document.getElementById('adminPwdInput').value;
  if (val === ADMIN_PASSWORD) {
    adminMode = true;
    document.body.classList.add('admin-mode');
    document.getElementById('adminPwdInput').value = '';
    document.getElementById('adminPwdWrap').classList.remove('visible');
    document.getElementById('adminHint').textContent = '✓ Modo noivos ativo';
    document.getElementById('adminHint').style.display = '';
    document.getElementById('adminHint').style.color = 'var(--desert-rock)';
    render();
    showToast('Bem-vindos, Fernanda & David! 💍');
  } else {
    showToast('Senha incorreta');
    document.getElementById('adminPwdInput').value = '';
  }
}

// ── FILTERS ─────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeFilter = this.dataset.filter;
    render();
  });
});

// ── TOAST ────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
  
}

// ── INIT ─────────────────────────────────────────────────
loadItems();
render();
</script>
</body>
</html>
